name: Build Android APK
# Запуск вручную (Actions -> Build Android APK -> Run workflow) или по тегу v*.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Capacitor требует папку webDir; реальный контент грузится с server.url (живой сайт).
      - name: Prepare web dir
        run: |
          mkdir -p www
          if [ -f index.html ]; then cp index.html www/index.html; else echo "<!doctype html><meta http-equiv=refresh content=0>" > www/index.html; fi

      - name: Install Capacitor
        run: npm install

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: footballisimo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Если запущено по тегу — публикуем APK в Releases
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
