name: Update data and deploy
on:
  schedule:
    - cron: "0 6 * * *"          # раз в сутки в 6:00 UTC
    # - cron: "*/30 * * * *"     # раскомментируй в дни матчей для частого обновления
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # Запускаем скрипт только если файл есть в репозитории
      - name: Update news JSON
        run: |
          if [ -f update_news_pipeline.py ]; then
            python update_news_pipeline.py
          else
            echo "update_news_pipeline.py не найден — пропускаем"
          fi

      - name: Update odds from Ligastavok
        env:
          LS_COOKIE: ${{ secrets.LS_COOKIE }}
        run: |
          if [ -f update_odds.py ]; then
            python update_odds.py
          else
            echo "update_odds.py не найден — пропускаем"
          fi

      - name: Update real match results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          if [ -f update_results.py ]; then
            python update_results.py
          else
            echo "update_results.py не найден — пропускаем"
          fi

      - name: Ensure api_data.json exists
        run: |
          if [ ! -f api_data.json ]; then
            echo '{"news":[],"odds":[],"results":[]}' > api_data.json
            echo "api_data.json создан"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api_data.json
          git diff --cached --quiet || git commit -m "Auto update: data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
