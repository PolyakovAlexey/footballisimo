name: Update data and deploy
on:
  schedule:
    - cron: "0 6 * * *"   # 09:00 МСК
    - cron: "0 7 * * *"   # 10:00 МСК
    - cron: "0 8 * * *"   # 11:00 МСК
    - cron: "0 9 * * *"   # 12:00 МСК
    - cron: "0 10 * * *"  # 13:00 МСК
    - cron: "0 11 * * *"  # 14:00 МСК
    - cron: "0 12 * * *"  # 15:00 МСК
    - cron: "0 13 * * *"  # 16:00 МСК
    - cron: "0 16 * * *"  # 19:00 МСК
    - cron: "0 18 * * *"  # 21:00 МСК
    - cron: "0 20 * * *"  # 23:00 МСК
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests

      - name: Обновить новости
        run: |
          [ -f update_news_pipeline.py ] && python update_news_pipeline.py || echo "нет update_news_pipeline.py"

      - name: Обновить коэффициенты (the-odds-api.com)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          [ -f update_odds.py ] && python update_odds.py || echo "нет update_odds.py"

      - name: Обновить результаты матчей (football-data.org)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          [ -f update_results.py ] && python update_results.py || echo "нет update_results.py"

      - name: Создать api_data.json если нет
        run: |
          [ -f api_data.json ] || echo '{"news":[],"odds":[],"results":[]}' > api_data.json

      - name: Коммит данных
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api_data.json
          git diff --cached --quiet || git commit -m "Auto update: news + odds + results"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
